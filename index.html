<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Камера</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0f0f1a;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 20px;
            text-align: center;
        }
        .btn {
            display: inline-block;
            padding: 20px 60px;
            background: #0088cc;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 24px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .note {
            opacity: 0.5;
            font-size: 14px;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <h1>📸 Открыть камеру</h1>
    <a href="tg://camera" class="btn">📷 Камера Telegram</a>
    <div class="note">⚠️ Откроется камера Telegram</div>
</body>
</html>
