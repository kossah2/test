<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фото без бота</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0f0f1a;
            color: white;
            font-family: system-ui;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            min-height: 100vh;
        }
        video {
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            transform: scaleX(-1);
            background: #1a1a2e;
        }
        #preview {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            background: #1a1a2e;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            border: 2px dashed #444;
            overflow: hidden;
        }
        #preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .btn-group {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            background: #00b894;
            color: white;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
        button.danger {
            background: #e17055;
        }
        #status {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            font-size: 14px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<video id="video" autoplay playsinline class="hidden"></video>
<div id="preview">📷</div>

<div class="btn-group">
    <button id="captureBtn">📸 Снять фото</button>
    <button id="retakeBtn" class="danger hidden">🔄 Переснять</button>
</div>

<div id="status">⏳ Запрос камеры...</div>

<script>
    const video = document.getElementById('video');
    const preview = document.getElementById('preview');
    const status = document.getElementById('status');
    const captureBtn = document.getElementById('captureBtn');
    const retakeBtn = document.getElementById('retakeBtn');

    let stream = null;

    // Включаем камеру
    navigator.mediaDevices.getUserMedia({ 
        video: { 
            facingMode: 'user',
            width: { ideal: 600 },
            height: { ideal: 600 }
        } 
    })
    .then(s => {
        stream = s;
        video.srcObject = s;
        video.classList.remove('hidden');
        status.textContent = '✅ Камера готова! Нажмите "Снять фото"';
        status.style.background = 'rgba(0,184,148,0.2)';
    })
    .catch(err => {
        status.textContent = '❌ Нет доступа к камере. Разрешите доступ в настройках.';
        status.style.background = 'rgba(255,107,107,0.2)';
        console.error(err);
    });

    // Снять фото
    captureBtn.addEventListener('click', () => {
        if (!stream) {
            status.textContent = '❌ Камера не доступна';
            return;
        }

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 600;
        canvas.height = video.videoHeight || 600;
        const ctx = canvas.getContext('2d');
        
        // Отражаем зеркально
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Показываем на странице
        const img = document.createElement('img');
        img.src = canvas.toDataURL('image/png');
        preview.innerHTML = '';
        preview.appendChild(img);

        // Меняем кнопки
        captureBtn.textContent = '💾 Сохранить фото';
        retakeBtn.classList.remove('hidden');
        
        // Скачиваем
        const link = document.createElement('a');
        link.download = `photo_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();

        status.textContent = '✅ Фото сохранено в галерею!';
        status.style.background = 'rgba(0,184,148,0.2)';
    });

    // Переснять
    retakeBtn.addEventListener('click', () => {
        preview.innerHTML = '📷';
        captureBtn.textContent = '📸 Снять фото';
        retakeBtn.classList.add('hidden');
        status.textContent = '📸 Готов к новому фото';
    });
</script>
</body>
</html>
