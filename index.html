<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фото на странице</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: #0f0f1a;
            color: white;
            font-family: system-ui;
            padding: 20px;
            gap: 20px;
        }
        video, #result {
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            background: #1a1a2e;
            transform: scaleX(-1);
        }
        #result {
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            border: 2px dashed #444;
            overflow: hidden;
        }
        #result img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        button {
            padding: 16px 40px;
            background: #00b894;
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 500px;
        }
        button:active { transform: scale(0.95); }
        .hidden { display: none; }
        #status {
            padding: 10px 20px;
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            font-size: 14px;
        }
    </style>
</head>
<body>

<video id="video" autoplay playsinline class="hidden"></video>
<div id="result">📷</div>
<button id="capture">📸 Снять фото</button>
<div id="status">⏳ Запрос камеры...</div>

<script>
    const video = document.getElementById('video');
    const result = document.getElementById('result');
    const status = document.getElementById('status');
    const btn = document.getElementById('capture');

    let stream = null;

    // Включаем камеру
    navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: 'user', width: { ideal: 800 }, height: { ideal: 800 } } 
    })
    .then(s => {
        stream = s;
        video.srcObject = s;
        video.classList.remove('hidden');
        status.textContent = '📸 Готово! Нажмите кнопку для фото';
        status.style.background = 'rgba(0,184,148,0.3)';
    })
    .catch(err => {
        status.textContent = '❌ Нет доступа к камере';
        status.style.background = 'rgba(255,107,107,0.3)';
        console.error(err);
    });

    // Снять фото
    btn.addEventListener('click', () => {
        if (!stream) {
            status.textContent = '❌ Камера не доступна';
            return;
        }

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 800;
        canvas.height = video.videoHeight || 800;
        const ctx = canvas.getContext('2d');
        
        // Отражаем зеркально
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Показываем на странице
        const img = document.createElement('img');
        img.src = canvas.toDataURL('image/png');
        result.innerHTML = '';
        result.appendChild(img);

        status.textContent = '✅ Фото сделано! Нажмите снова для нового';
        status.style.background = 'rgba(0,184,148,0.3)';

        // Скачиваем (опционально)
        const link = document.createElement('a');
        link.download = `photo_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
</script>
</body>
</html>
